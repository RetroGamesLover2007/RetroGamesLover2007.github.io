<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #33ff33;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 30px 20px 10px 20px;
            border-bottom: 2px solid #33ff33;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #33ff33, 0 0 30px #33ff33;
        }

        main {
            width: 100%;
            max-width: 1150px;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            padding: 0 20px;
        }

        #game-sidebar {
            width: 280px;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            border: 2px solid #33ff33;
            background: #050505;
            box-shadow: 0 0 10px rgba(51, 255, 51, 0.3);
        }

        #search-bar {
            width: 100%;
            padding: 12px 15px;
            background: #0a0a0a;
            border: none;
            border-bottom: 2px solid #33ff33;
            color: #33ff33;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        #search-bar::placeholder {
            color: #33ff33;
            opacity: 0.4;
        }

        #search-bar:focus {
            background: #0f1a0f;
        }

        #game-list {
            height: 400px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #game-list::-webkit-scrollbar {
            width: 8px;
        }

        #game-list::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        #game-list::-webkit-scrollbar-thumb {
            background: #33ff33;
            border-radius: 0;
        }

        #game-list::-webkit-scrollbar-thumb:hover {
            background: #66ff66;
        }

        .game-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(51, 255, 51, 0.15);
            font-family: monospace;
            font-size: 0.95rem;
            color: #33ff33;
            transition: all 0.1s ease;
            user-select: none;
        }

        .game-item:hover {
            background: #0f2a0f;
            color: #66ff66;
            padding-left: 20px;
        }

        .game-item.active {
            background: #33ff33;
            color: #0a0a0a;
            font-weight: bold;
        }

        #game-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        #game-wrapper {
            border: 2px solid #33ff33;
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.3);
            width: 800px;
            height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            overflow: hidden;
            position: relative;
        }

        #game-wrapper canvas,
        #game-wrapper iframe {
            width: 1000px !important;
            height: 600px !important;
            image-rendering: pixelated;
        }

        #control-bar {
            width: 800px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 8px 10px;
            background: #050505;
            border: 2px solid #33ff33;
            border-top: none;
        }

        #control-bar button {
            background: #0a0a0a;
            color: #33ff33;
            border: 2px solid #33ff33;
            font-family: monospace;
            font-size: 12px;
            padding: 5px 10px;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        #control-bar button:hover {
            background: #33ff33;
            color: #0a0a0a;
        }

        #control-bar button:active {
            background: #22aa22;
            color: #0a0a0a;
        }
    </style>
</head>
<body>

    <header>
        <h1>RETRO VAULT</h1>
    </header>

    <main>
        <div id="game-sidebar">
            <input type="text" id="search-bar" placeholder="Search games...">
            <div id="game-list"></div>
        </div>
        <div id="game-area">
            <div id="game-wrapper"></div>
            <div id="control-bar">
                <button id="btn-play">▶ Play</button>
                <button id="btn-pause">⏸ Pause</button>
                <button id="btn-stop">⏹ Stop</button>
                <button id="btn-save">💾 Save</button>
                <button id="btn-load">📂 Load</button>
                <button id="btn-fullscreen">⛶ Full</button>
            </div>
        </div>
    </main>

    
<script src="js/emulator.min.js"></script>
<script>
    window.addEventListener('load', function() {

        const games = [
            { name: "Super Mario Bros.", system: "nes", rom: "roms/super-mario-bros.nes" },
            { name: "The Legend of Zelda", system: "nes", rom: "roms/zelda.nes" },
            { name: "Metroid", system: "nes", rom: "roms/metroid.nes" },
            { name: "Sonic the Hedgehog", system: "segaMD", rom: "roms/sonic.md" },
            { name: "Streets of Rage 2", system: "segaMD", rom: "roms/sor2.md" }
        ];

        var currentEmulator = null;

        const searchInput = document.getElementById('search-bar');
        const gameList = document.getElementById('game-list');
        const controlBar = document.getElementById('control-bar');

        controlBar.style.display = 'none';

        function renderGameList(filterText) {
            gameList.innerHTML = '';

            var filtered = games.filter(function(game) {
                return game.name.toLowerCase().includes(filterText.toLowerCase());
            });

            if (filtered.length === 0) {
                var emptyMsg = document.createElement('p');
                emptyMsg.textContent = 'No games found.';
                emptyMsg.style.padding = '15px';
                emptyMsg.style.color = '#33ff33';
                emptyMsg.style.opacity = '0.6';
                gameList.appendChild(emptyMsg);
                return;
            }

            filtered.forEach(function(game) {
                var item = document.createElement('div');
                item.className = 'game-item';
                item.textContent = game.name;

                item.addEventListener('click', function() {
                    document.querySelectorAll('.game-item').forEach(function(el) {
                        el.classList.remove('active');
                    });
                    item.classList.add('active');
                    launchGame(game.system, game.rom);
                });

                gameList.appendChild(item);
            });
        }

        searchInput.addEventListener('input', function() {
            renderGameList(this.value);
        });

        renderGameList('');

        function launchGame(system, romPath) {
            var wrapper = document.getElementById('game-wrapper');
            wrapper.innerHTML = '';

            var filename = romPath.split('/').pop();

            currentEmulator = new EmulatorJS('#game-wrapper', {
                system: system,
                rom: romPath,
                gameUrl: romPath,
                gameFileName: filename,
                autosave: false,
                dataPath: 'data/'
            });

            controlBar.style.display = 'flex';

            setTimeout(function() {
                var canvas = document.querySelector('#game-wrapper canvas');
                if (canvas) {
                    canvas.style.width = '800px';
                    canvas.style.height = '600px';
                }
            }, 1500);
        }

        document.getElementById('btn-play').addEventListener('click', function() {
            if (currentEmulator && typeof currentEmulator.play === 'function') {
                currentEmulator.play();
            }
        });

        document.getElementById('btn-pause').addEventListener('click', function() {
            if (currentEmulator && typeof currentEmulator.pause === 'function') {
                currentEmulator.pause();
            }
        });

        document.getElementById('btn-stop').addEventListener('click', function() {
            if (currentEmulator && currentEmulator.gameManager && typeof currentEmulator.gameManager.exit === 'function') {
                currentEmulator.gameManager.exit();
            }
            currentEmulator = null;
            document.getElementById('game-wrapper').innerHTML = '';
            controlBar.style.display = 'none';
        });

        document.getElementById('btn-save').addEventListener('click', function() {
            if (currentEmulator && currentEmulator.gameManager && typeof currentEmulator.gameManager.saveState === 'function') {
                currentEmulator.gameManager.saveState();
            }
        });

        document.getElementById('btn-load').addEventListener('click', function() {
            if (currentEmulator && currentEmulator.gameManager && typeof currentEmulator.gameManager.loadState === 'function') {
                currentEmulator.gameManager.loadState();
            }
        });

        document.getElementById('btn-fullscreen').addEventListener('click', function() {
            if (currentEmulator && currentEmulator.gameManager && typeof currentEmulator.gameManager.openFullscreen === 'function') {
                currentEmulator.gameManager.openFullscreen();
            }
        });

    });
</script>
</body>
</html>
