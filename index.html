<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Vault</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #33ff33;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 30px 20px 10px 20px;
            border-bottom: 2px solid #33ff33;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            letter-spacing: 4px;
            text-shadow: 0 0 15px #33ff33, 0 0 30px #33ff33;
        }

        main {
            width: 100%;
            max-width: 1100px;
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 20px;
            padding: 0 20px;
        }

        #game-sidebar {
            width: 280px;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            border: 2px solid #33ff33;
            background: #050505;
            box-shadow: 0 0 10px rgba(51, 255, 51, 0.3);
        }

        #search-bar {
            width: 100%;
            padding: 12px 15px;
            background: #0a0a0a;
            border: none;
            border-bottom: 2px solid #33ff33;
            color: #33ff33;
            font-family: monospace;
            font-size: 1rem;
            outline: none;
            box-sizing: border-box;
        }

        #search-bar::placeholder {
            color: #33ff33;
            opacity: 0.4;
        }

        #search-bar:focus {
            background: #0f1a0f;
        }

        #game-list {
            height: 400px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        #game-list::-webkit-scrollbar {
            width: 8px;
        }

        #game-list::-webkit-scrollbar-track {
            background: #0a0a0a;
        }

        #game-list::-webkit-scrollbar-thumb {
            background: #33ff33;
            border-radius: 0;
        }

        #game-list::-webkit-scrollbar-thumb:hover {
            background: #66ff66;
        }

        .game-item {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid rgba(51, 255, 51, 0.15);
            font-family: monospace;
            font-size: 0.95rem;
            color: #33ff33;
            transition: all 0.1s ease;
            user-select: none;
        }

        .game-item:hover {
            background: #0f2a0f;
            color: #66ff66;
            padding-left: 20px;
        }

        .game-item.active {
            background: #33ff33;
            color: #0a0a0a;
            font-weight: bold;
        }

        #game-wrapper {
            flex-grow: 1;
            border: 2px solid #33ff33;
            box-shadow: 0 0 15px rgba(51, 255, 51, 0.3);
            min-height: 600px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
    </style>
</head>
<body>

    <header>
        <h1>RETRO VAULT</h1>
    </header>

    <main>
        <div id="game-sidebar">
            <input type="text" id="search-bar" placeholder="Search games...">
            <div id="game-list"></div>
        </div>
        <div id="game-wrapper"></div>
    </main>

    <script src="js/emulator.min.js"></script>
    <script src="js/main.js"></script>

</body>
</html>
